- id: vlsi-2026-fp8-cim
  selected: true
  title: "A 40nm 24.85-to-80.59 TFLOPS/W FP8 Computing-in-Memory Macro with Outlier-Aware Hierarchical-Alignment for Edge Transformers"
  authors: "<strong>Zhiwei Zhou</strong><sup>*</sup>, Tong Hu<sup>*</sup>, Jia Chen, Jiancong Li, Yuyang Fu, Yi Li, Xiangshui Miao"
  venue: "2026 IEEE Symposium on VLSI Technology and Circuits"
  year: 2026
  note: "* Equal contribution."
  image: "/images/publications/vlsi-2026-fp8-cim.png"
  citations: 0
  status: "HTML/PDF pending"
  abstract: >-
    This paper presents a digital compute-in-memory (CIM)-based macro tailored for edge Transformer acceleration. It introduces a Hierarchical Dual-Exponent Alignment scheme that separates outliers from normal values, a Sign-Magnitude Input Serial Pipelined Aligner that reduces area and power, and a Shift-Concat based Sign-Inverse Adder Tree that saves accumulation area and power. The measured macro achieves 24.85-80.59 TFLOPS/W in FP8 and up to 6.66x energy-efficiency improvement over state-of-the-art post-alignment FP-CIM schemes.

- id: dac-2026-hp-cim
  selected: true
  title: "HP-CIM: A Computing-in-Memory Transformer Accelerator with ReRAM-based Hash Predictor for Attention Sparsity Exploitation"
  authors: "Tong Li<sup>*</sup>, <strong>Zhiwei Zhou</strong><sup>*</sup>, Jiancong Li, Yuyang Fu, Yingjie Yu, Tong Hu, Jia Chen, Yi Li, Xiangshui Miao"
  venue: "Design Automation Conference (DAC)"
  year: 2026
  note: "* Equal contribution."
  image: "/images/publications/dac-2026-hp-cim.png"
  citations: 0
  status: "HTML/PDF pending"
  abstract: >-
    HP-CIM is a computing-in-memory Transformer accelerator that exploits attention sparsity through a ReRAM-based hash predictor. The predictor uses intrinsic ReRAM conductance variation for low-cost hash projection and integrates a ReRAM content-addressable memory with a K-winner-take-all circuit for parallel Top-K matching. Across multiple Transformer models and tasks, HP-CIM improves energy efficiency by 9.05-310.04x and speed by 2.48-16.93x over state-of-the-art CIM-based Transformer accelerators.

